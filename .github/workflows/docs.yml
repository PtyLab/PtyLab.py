name: Deploy Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
